version: "3.9"

services:
  # ─────────────────────────────────────────────
  # ForgeOps MCP Server
  # ─────────────────────────────────────────────
  forgeops:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: forgeops-mcp
    restart: unless-stopped
    environment:
      # GitHub PAT — set this in your .env file, never hardcode it
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Point to the Redis container by its service name
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_PORT=9090
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=production
    ports:
      # Expose Prometheus metrics endpoint to the host
      - "9090:9090"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - forgeops-net

  # ─────────────────────────────────────────────
  # Redis — Caching Layer
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forgeops-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      # Persist Redis data across container restarts
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - forgeops-net

  # ─────────────────────────────────────────────
  # Prometheus — Metrics Scraper (optional)
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: forgeops-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - forgeops-net

volumes:
  redis-data:
  prometheus-data:

networks:
  forgeops-net:
    driver: bridge
